<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- 背景（お庭のやさしい白・生成り） -->
  <rect width="512" height="512" rx="128" fill="#FDFBF7" />
  
  <!-- 内枠（紅茶色のやわらかい境界線） -->
  <rect x="24" y="24" width="464" height="464" rx="104" fill="none" stroke="#8C6239" stroke-width="6" opacity="0.15" />
  
  <!-- 庭の葉っぱモチーフ（くすみグリーンと紅茶色のハーモニー） -->
  <g transform="translate(256, 256) scale(1.1)">
    <!-- 茎 -->
    <path d="M-10,120 Q-15,40 -20,-80" fill="none" stroke="#8C6239" stroke-width="12" stroke-linecap="round" />
    
    <!-- メインの大きな葉 -->
    <path d="M-20,-80 C-110,0 -80,100 -20,100 C40,100 80,10 -20,-80 Z" fill="#5F7D6B" />
    
    <!-- 葉脈 -->
    <path d="M-20,-60 Q-23,10 -20,100" fill="none" stroke="#FDFBF7" stroke-width="4" stroke-linecap="round" opacity="0.4" />
    <path d="M-21,-20 Q-50,-30 -70,-35" fill="none" stroke="#FDFBF7" stroke-width="3.5" stroke-linecap="round" opacity="0.3" />
    <path d="M-21,10 Q-55,10 -72,15" fill="none" stroke="#FDFBF7" stroke-width="3.5" stroke-linecap="round" opacity="0.3" />
    <path d="M-20,-10 Q10,-25 35,-30" fill="none" stroke="#FDFBF7" stroke-width="3.5" stroke-linecap="round" opacity="0.3" />
    <path d="M-20,20 Q15,15 38,10" fill="none" stroke="#FDFBF7" stroke-width="3.5" stroke-linecap="round" opacity="0.3" />

    <!-- 寄り添う小さな芽（紅茶色） -->
    <path d="M-20,30 Q30,40 45,10 C50,25 40,55 5,55 C-15,55 -20,40 -20,30 Z" fill="#8C6239" opacity="0.8" />
  </g>
</svg>
